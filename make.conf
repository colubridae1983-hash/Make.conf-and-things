# =============================================================
# /etc/portage/make.conf
# AMD Ryzen 9 5950X / RX 7900 XTX — Gentoo Gaming Desktop
# X11 + DWM | OpenRC | Legacy BIOS Boot
# =============================================================

# --- Compiler Flags ------------------------------------------
# znver3: explicit Zen 3 target — safer for Portage than -march=native
# -O2: proven safe optimization level across all packages
# -pipe: use memory for temp files instead of disk I/O
CFLAGS="-march=znver3 -O2 -pipe"
CXXFLAGS="${CFLAGS}"
FCFLAGS="${CFLAGS}"
FFLAGS="${CFLAGS}"

# --- CPU Feature Flags ----------------------------------------
# Replace with actual output from: cpuid2cpuflags
# Install first with: emerge --ask app-portage/cpuid2cpuflags
CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 ssse3"

# --- Build Parallelism ----------------------------------------
# -j32: all 32 threads during compilation
# -l32: don't spawn new jobs if system load already at 32
MAKEOPTS="-j28 -l28"

# Portage runs at lowest priority — system stays usable during builds
PORTAGE_NICENESS="19"

# --- Portage Behaviour ----------------------------------------
EMERGE_DEFAULT_OPTS="--ask --verbose --keep-going --complete-graph"
FEATURES="parallel-fetch candy clean-logs"

# --- Accept Keywords ------------------------------------------
# ~amd64 testing branch: required for current Mesa, kernel,
# PipeWire, Steam, and all gaming-relevant packages.
# Gentoo stable is 6-12 months behind for these.
ACCEPT_KEYWORDS="~amd64"

# --- Global USE Flags -----------------------------------------
USE="
  -systemd -wayland -kde -gnome -plasma -qt5 -qt6

  X

  pipewire alsa -pulseaudio

  vulkan opencl vaapi vdpau opengl

  bluetooth dbus

  ffmpeg

  gamepad joystick

  truetype fontconfig

  acl xattr zstd

  -doc -test -debug
"

# --- Hardware: Video Card -------------------------------------
# amdgpu: DRM/KMS kernel interface
# radeonsi: Mesa Gallium3D — covers OpenGL, Vulkan (RADV), compute
# DO NOT add 'radeon' — that is for pre-GCN cards only
VIDEO_CARDS="amdgpu radeonsi"

# --- Hardware: Input Devices ----------------------------------
# libinput: handles all input under both Xorg and Wayland
INPUT_DEVICES="libinput"

# --- Mirrors --------------------------------------------------
# Run: mirrorselect -i -o >> /etc/portage/make.conf
# to auto-detect fastest mirrors. A placeholder example:
# GENTOO_MIRRORS="https://mirror.init7.net/gentoo/"
